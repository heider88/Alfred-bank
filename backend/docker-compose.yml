version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: habi_postgres
    environment:
      POSTGRES_USER: habi_user
      POSTGRES_PASSWORD: habi_password
      POSTGRES_DB: habi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
    name: habi_postgres_data
